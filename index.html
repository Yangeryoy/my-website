<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>完整點餐系統</title>

<style>
body {
    font-family: "Microsoft JhengHei", sans-serif;
    background: #f7f3ee;
    padding: 20px;
}

h1 {
    text-align: center;
}

.container {
    max-width: 700px;
    margin: auto;
}

.item {
    background: white;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

button {
    cursor: pointer;
    border: none;
    border-radius: 6px;
}

.add {
    background: #6f4e37;
    color: white;
    padding: 6px 12px;
}

.cart {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-top: 20px;
}

.qty-btn {
    background: #eee;
    padding: 3px 8px;
    margin: 0 3px;
}

.del {
    background: red;
    color: white;
    padding: 3px 8px;
}

.send {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    background: green;
    color: white;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="container">

<h1>☕ 點餐系統</h1>

<div id="menu"></div>

<div class="cart">
    <h2>🛒 購物車</h2>
    <div id="cart"></div>
    <h3 id="total">總金額：$0</h3>

    <button class="send" onclick="sendOrder()">送出訂單</button>
</div>

</div>

<script>

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTMRHoRwK52PyrYbxHYxfI3P0dzhkNJHdkcsj5y7obE1Wyfy4wc01IBQlaXP2TWzDXAfqTGBCI9LqmX/pub?gid=908591430&single=true&output=csv";
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw_m8vOgWdjPlJq1-nZ78BgrTLRP0Qy-_n9ED8LpQf3pxta0j3mDnscE51KLh9O6wlGzQ/exec";

let cart = {};
let menu = [];

async function loadMenu() {

    const res = await fetch(CSV_URL);
    const text = await res.text();

    const rows = text.trim().split("\n").slice(1);

    menu = rows.map(r => {
        const c = r.split(",");
        return {
            name: c[2],
            price: Number(c[3]?.replace(/[^0-9]/g, ""))
        };
    }).filter(i => i.name && i.price);

    renderMenu();
}

function renderMenu() {

    document.getElementById("menu").innerHTML = menu.map(item => `
        <div class="item">
            <div>
                <b>${item.name}</b><br>
                $${item.price}
            </div>
            <button class="add" onclick="add('${item.name}', ${item.price})">加入</button>
        </div>
    `).join("");
}

function add(name, price) {

    if (!cart[name]) {
        cart[name] = { price: price, qty: 1 };
    } else {
        cart[name].qty++;
    }

    renderCart();
}

function renderCart() {

    let html = "";
    let total = 0;

    for (let name in cart) {

        const item = cart[name];
        const subtotal = item.price * item.qty;
        total += subtotal;

        html += `
        <div>
            <b>${name}</b>
            <button class="qty-btn" onclick="change('${name}', -1)">-</button>
            ${item.qty}
            <button class="qty-btn" onclick="change('${name}', 1)">+</button>
            $${subtotal}
            <button class="del" onclick="removeItem('${name}')">X</button>
        </div>
        `;
    }

    document.getElementById("cart").innerHTML = html || "空的";
    document.getElementById("total").innerText = "總金額：$" + total;
}

function change(name, val) {

    cart[name].qty += val;

    if (cart[name].qty <= 0) {
        delete cart[name];
    }

    renderCart();
}

function removeItem(name) {
    delete cart[name];
    renderCart();
}

async function sendOrder() {

    if (Object.keys(cart).length === 0) {
        alert("購物車是空的");
        return;
    }

    const orderId = Date.now();

    let items = [];

    for (let name in cart) {
        items.push({
            name: name,
            qty: cart[name].qty,
            price: cart[name].price
        });
    }

    const order = {
        orderId: orderId,
        items: items,
        total: document.getElementById("total").innerText
    };

    await fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify(order)
    });

    alert("訂單已送出");

    cart = {};
    renderCart();
}

loadMenu();

</script>

</body>
</html>
